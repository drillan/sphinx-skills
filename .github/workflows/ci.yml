name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run validator tests
        run: uv run pytest tests/ -v

      - name: Validate SKILL.md files
        run: uv run python scripts/validate_skills.py skills

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy scripts tests

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install APM
        run: |
          curl -sSL https://aka.ms/apm-unix | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Audit SKILL.md for hidden Unicode
        run: |
          for f in skills/*/SKILL.md; do
            apm audit --file "$f"
          done

  gh-skill-dry-run:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install gh skill extension
        id: install_gh_skill
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-skill

      - name: Dry-run publish (only when gh skill is available)
        if: steps.install_gh_skill.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh skill publish --dry-run

      - name: Note when gh skill is unavailable
        if: steps.install_gh_skill.outcome != 'success'
        run: echo "::notice::gh skill extension not available; dry-run skipped intentionally"
